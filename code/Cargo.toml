[package]
name = "kitchensync"
version = "0.1.0"
edition = "2021"

[dependencies]
rusqlite = { version = "0.31", features = ["bundled"] }
json5 = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
ssh2 = "0.9"
xxhash-rust = { version = "0.8", features = ["xxh64"] }
globset = "0.4"
tiny_http = "0.12"
crossbeam-channel = "0.5"
url = "2"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4"] }
regex-lite = "0.1"
percent-encoding = "2"

[profile.release]
strip = true
lto = true
