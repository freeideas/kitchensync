[package]
name = "kitchensync"
version = "0.1.0"
edition = "2021"

[dependencies]
rusqlite = { version = "0.31", features = ["bundled"] }
xxhash-rust = { version = "0.8", features = ["xxh64"] }
ssh2 = "0.9"
notify = "6"
ignore = "0.4"
url = "2"
tiny_http = "0.12"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = "0.4"
uuid = { version = "1", features = ["v4"] }
crossbeam-channel = "0.5"
walkdir = "2"
dirs = "5"
percent-encoding = "2"
filetime = "0.2"

[profile.release]
strip = true
lto = true
